version: '3.9'

services:

  postgres:
    image: postgres:17
    container_name: postgres

    environment:
      POSTGRES_DB: webapp
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: timo.steylen@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "8085:80"

    depends_on:
      - postgres

volumes:
  postgres_data:

