<div class="todo-update-container">
  <mat-card class="example-card" appearance="outlined">
    <mat-card-header>
      <div mat-card-avatar class="example-header-image"></div>
      <mat-card-title>Java examen</mat-card-title>
      <mat-card-subtitle>Behalen van het OCP Java examen</mat-card-subtitle>
    </mat-card-header>
     <mat-card-content>
       <mat-chip-set aria-label="Fish selection">
         <mat-chip>Java</mat-chip>
         <mat-chip>Certificeren</mat-chip>
         <mat-chip>OCP</mat-chip>
       </mat-chip-set>
       <p><mat-slide-toggle></mat-slide-toggle></p>
    </mat-card-content>
    <mat-card-actions>
      <button matButton>Verwijderen</button>
    </mat-card-actions>
  </mat-card>
</div>
