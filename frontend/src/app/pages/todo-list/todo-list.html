<h1>Todos</h1>

<table mat-table [dataSource]="dataSource" matSort>

  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
    <td mat-cell *matCellDef="let todo">
      {{ todo.id }}
    </td>
  </ng-container>

  <!-- Name -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Naam</th>
    <td mat-cell *matCellDef="let todo">
      {{ todo.name }}
    </td>
  </ng-container>

  <!-- Description -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Beschrijving</th>
    <td mat-cell *matCellDef="let todo">
      {{ todo.description }}
    </td>
  </ng-container>

  <!-- Tags -->
  <ng-container matColumnDef="tags">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Tags</th>
    <td mat-cell *matCellDef="let todo">
      {{ todo.tags }}
    </td>
  </ng-container>

  <!-- Created At -->
  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Datum Aangemaakt</th>
    <td mat-cell *matCellDef="let todo">
      {{ todo.createdAt }}
    </td>
  </ng-container>

  <!-- Deadline Date -->
  <ng-container matColumnDef="deadlineDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Deadline Datum</th>
    <td mat-cell *matCellDef="let todo">
      {{ todo.deadlineDate }}
    </td>
  </ng-container>

  <!-- Completed -->
  <ng-container matColumnDef="completed">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Completed</th>
    <td mat-cell *matCellDef="let row">
      {{ row.completed }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
