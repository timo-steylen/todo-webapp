<div class="todo-create-container">

  <h1>Nieuwe Todo</h1>

  <form class="todo-form" [formGroup]="todoForm" (ngSubmit)="saveTodo()">
    <mat-form-field>
      <mat-label>Titel</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Omschrijving</mat-label>
      <input matInput formControlName="description">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Tags</mat-label>
      <textarea matInput formControlName="tags"></textarea>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Angular forms</mat-label>
      <input matInput [matDatepicker]="picker1" formControlName="deadlineDate">
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
      <mat-datepicker #picker1></mat-datepicker>
    </mat-form-field>
    <section>
      <div class="button-row">
        <button matButton="outlined" class="button" (click)="cancel()">Annuleren</button>
      </div>
      <div class="button-row">
        <button matButton="filled" class="button" type="submit">Opslaan</button>
      </div>
    </section>
  </form>
</div>
